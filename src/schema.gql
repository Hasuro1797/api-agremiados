type Mutation {
  """Login para agremiados. Acepta email o DNI como identificador"""
  signinMember(input: LoginInput!): AuthResponse!

  """
  Login exclusivo para administradores (SUPERADMIN, ADMIN, MODERATOR, ETC)
  """
  signinAdmin(signinAdminInput: LoginInput!): AuthResponse!

  """
  Registro de nuevos agremiados o completar registro para pre-registrados
  """
  register(input: RegisterInput!): AuthResponse!

  """Registro del SUPERADMIN"""
  registerSuperAdmin(signupAdminInput: CreateUserAdminInput!): AuthResponse!

  """Obtener nuevos tokens usando el refresh token"""
  refreshTokens: AuthResponse!

  """Cerrar sesión y revocar tokens"""
  signout: MessageResponse!

  """Solicitar recuperación de contraseña. Envía email con enlace"""
  forgotPassword(input: ForgotPasswordInput!): MessageResponse!

  """Restablecer contraseña usando el token de recuperación"""
  resetPassword(resetPasswordInput: ResetPasswordInput!): MessageResponse!

  """Cambiar contraseña del usuario autenticado"""
  changePassword(input: ChangePasswordInput!): MessageResponse!

  """Crear un nuevo usuario. Solo accesible para SUPERADMIN"""
  createUser(createUserInput: CreateUserInput!, role: String!): UserProfile!

  """Actualizar un usuario existente"""
  updateUser(updateUserInput: UpdateUserInput!, role: String!): UserProfile!

  """Eliminar uno o más usuarios"""
  removeUser(ids: [String!]!): Boolean!

  """Cambiar el estado de uno o más usuarios"""
  changeStatusUser(ids: [String!]!, status: String!): Boolean!

  """Subir uno o varios archivos"""
  uploadMedia(files: [Upload!]): [Media!]!

  """Actualizar un medio existente"""
  updateMedia(updateMediaInput: UpdateMediaInput!): Media!

  """Eliminar uno o varios medios"""
  removeMedia(ids: [Int!]!): Boolean!

  """Crear una nueva actividad académica"""
  createActivity(createActivityInput: CreateActivityInput!): Activity!

  """Actualizar una actividad académica existente"""
  updateActivity(updateActivityInput: UpdateActivityInput!): Activity!

  """Cambiar el estado de una o más actividades académicas"""
  changeStatusActivity(ids: [Int!]!, status: String!): Boolean!

  """Eliminar una o más actividades académicas"""
  removeActivities(ids: [Int!]!): Boolean!

  """Crear un nuevo agremiado"""
  createMember(input: CreateMemberInput!): Member!

  """Actualizar un agremiado existente"""
  updateMember(input: UpdateMemberInput!): Member!

  """Eliminar uno o más agremiados"""
  removeMembers(ids: [String!]!): Boolean!

  """Cambiar el estado de uno o más agremiados"""
  changeStatusMember(ids: [String!]!, status: String!): Boolean!

  """Registrar un agremiado como asistente de una actividad"""
  registerAttendee(input: RegisterAttendeeInput!): AttendeeEntity!

  """Registrar un invitado (INVITED) o externo (EXTERNAL) en una actividad"""
  addNonMemberAttendee(input: AddNonMemberInput!): AttendeeEntity!

  """Confirmar la asistencia de un asistente (cualquier tipo)"""
  confirmAttendance(attendeeId: String!): AttendeeEntity!

  """Cancelar el registro de un miembro y liberar cupo"""
  cancelAttendee(attendeeId: String!): AttendeeEntity!

  """Eliminar un invitado o externo de una actividad"""
  removeNonMemberAttendee(attendeeId: String!): Boolean!

  """
  Inicializa el sistema de cuotas: crea el primer periodo y asigna a todos los miembros activos. Requiere QuoteAmount y quotaDueDay configurados.
  """
  initializeQuotaSystem: Boolean!

  """Crear o actualizar la configuración de la organización"""
  upsertOrganization(input: UpdateOrganizationInput!): OrganizationEntity!

  """Subir o reemplazar una imagen de branding (logo, favicon, banner)"""
  uploadBrandingImage(field: BrandingImageField!, file: Upload!): OrganizationEntity!

  """Eliminar una imagen de branding (logo, favicon, banner)"""
  deleteBrandingImage(field: BrandingImageField!): OrganizationEntity!

  """Crear un nuevo monto de cuota"""
  createQuoteAmount(input: CreateQuoteAmountInput!): QuoteAmountEntity!

  """Actualizar un monto de cuota"""
  updateQuoteAmount(input: UpdateQuoteAmountInput!): QuoteAmountEntity!

  """Eliminar montos de cuota por IDs"""
  removeQuoteAmounts(ids: [Int!]!): Boolean!

  """Crear un nuevo descuento de cuota"""
  createQuotaDiscount(input: CreateQuotaDiscountInput!): QuotaDiscountEntity!

  """Actualizar un descuento de cuota"""
  updateQuotaDiscount(input: UpdateQuotaDiscountInput!): QuotaDiscountEntity!

  """Cambiar el estado de descuentos de cuota (ACTIVE / DRAFT)"""
  changeStatusQuotaDiscount(ids: [Int!]!, status: String!): Boolean!

  """Eliminar descuentos de cuota por IDs"""
  removeQuotaDiscounts(ids: [Int!]!): Boolean!

  """Crear una nueva plantilla de notificación"""
  createNotificationTemplate(input: CreateNotificationTemplateInput!): NotificationTemplateEntity!

  """Actualizar una plantilla de notificación"""
  updateNotificationTemplate(input: UpdateNotificationTemplateInput!): NotificationTemplateEntity!

