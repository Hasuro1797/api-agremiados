  reopenReason: String!
}

input RateSupportInput {
  supportId: Int!
  rating: Int!
  comment: String
}

input CreateSupportMessageInput {
  supportId: Int!
  body: String!
  isInternal: Boolean = false
}

input AssignSupportInput {
  supportId: Int!
  assignedTo: String!
  assignedName: String!
  dueDate: DateTime
  priority: String
}

input ResolveSupportInput {
  supportId: Int!
  resolutionBody: String!
}

input RejectSupportInput {
  supportId: Int!
  rejectReason: String!
}

input UpdateNotificationPreferenceInput {
  triggerKey: String!
  channel: NotificationChannel!
  enabled: Boolean!
}