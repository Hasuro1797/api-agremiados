  """Crear una nueva regla de automatización"""
  createAutomationRule(input: CreateAutomationRuleInput!): AutomationRuleEntity!

  """Actualizar una regla de automatización"""
  updateAutomationRule(input: UpdateAutomationRuleInput!): AutomationRuleEntity!

  """Activar o desactivar una regla de automatización"""
  toggleAutomationRule(id: Int!): AutomationRuleEntity!
  createReservation(createReservationInput: CreateReservationInput!): Reservation!
  updateReservation(updateReservationInput: UpdateReservationInput!): Reservation!
  removeReservations(ids: [Int!]!): Boolean!
  changeStatusReservation(ids: [Int!]!, status: String!): Boolean!
