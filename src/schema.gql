  retryInvoiceSunat(invoiceId: String!): Boolean!

  """
  Reserva el concepto (cuota o cupo de evento), crea el comprobante PENDIENTE y devuelve el token Izipay (expira en 15 min).
  """
  generatePaymentToken(input: GeneratePaymentTokenInput!): PaymentTokenEntity!

  """
  Callback del formulario Izipay. Valida la firma/transacción y aplica el resultado (idempotente).
  """
  confirmPayment(input: ConfirmPaymentInput!): PaymentResultEntity!

  """
  Inscribe al usuario autenticado en una actividad gratuita (sin pago Izipay). Reserva el cupo de forma atómica.
  """
  enrollFreeActivity(activityId: Int!): EnrollmentResultEntity!

  """
  [SOLO DESARROLLO] Fuerza el resultado de un pago sin pasar por Izipay (para pruebas). Bloqueado en producción.
  """
  devConfirmPayment(transactionId: String!, outcome: String = "PAID"): PaymentResultEntity!

  """
  Anulación interna de un comprobante NO aceptado por SUNAT. Revierte stock/cuota.
  """
  voidInvoice(input: VoidInvoiceInput!): InvoiceHeaderEntity!

  """
  Emite una Nota de Crédito (anulación/devolución) de un comprobante aceptado por SUNAT.
  """
  createCreditNote(input: CreateCreditNoteInput!): InvoiceHeaderEntity!
}

